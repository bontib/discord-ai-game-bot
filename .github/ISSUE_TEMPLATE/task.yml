name: Task
description: A piece of work that isn't a bug fix or new feature (chore, refactor, setup)
title: "[Task]: "
labels: ["task"]
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What needs to be accomplished
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Detailed description of the work
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: false
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Any blockers or related work
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes
    validations:
      required: false
